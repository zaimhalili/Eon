<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="./src/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eon - Timer</title>
</head>

<body
  class="h-screen w-screen overflow-hidden bg-black/80 bg-[url('/cyberpunk.jpg')] bg-blend-overlay bg-cover bg-center bg-no-repeat flex-col flex backdrop-blur-sm px-10 py-5">
  <div class="flex w-full justify-between">
    <h1 class="text-md text-(--light) cursor-default">Eon</h1>
    <p class="text-md text-(--light) cursor-default" title="Current time" id="clock"></p>
  </div>
  <!-- Timer -->
  <div class="flex items-center justify-center w-full text-(--light) flex-col pt-10">
    <p class="text-[10rem] cursor-default">20:25</p>
    <div class="flex gap-5">
      <button
        class="rounded-sm border-2 py-2 px-3 cursor-pointer text-(--light) border-(--light) hover:bg-(--light)  hover:text-(--mid) transition active:scale-90 duration-75">Restart</button>
      <button
        class="rounded-sm border-2 py-2 px-3 cursor-pointer text-(--light) border-(--light) hover:bg-(--light) hover:text-(--mid) transition active:scale-90 duration-75">Pause</button>
    </div>
  </div>
  <!-- Tasks -->
  <div class="w-full flex text-(--light) pt-10 flex-col items-center gap-3">
    <div
      class="bg-black/30 rounded-lg w-2xl px-5 py-3 gap-1 flex flex-col max-h-30 md:max-h-45 lg:max-h-55 xl:max-h-60 2xl:max-h-120 overflow-y-auto">
      <div class="flex w-full justify-between items-center">
        <p class="pb-3 text-md">Next task...</p>
        <button type="button" class="bg-black/30 flex w-fit h-fit p-1 rounded-md cursor-pointer hover:text-(--mid) text-(--light) active:scale-95 transition duration-75" title="Clear tasks"><i class="fa-solid fa-trash-can text-md"></i></button>
      </div>
      <p
        class="flex w-full px-5 py-3 border-(--light) border text-sm rounded-md hover:bg-black transition duration-75 cursor-pointer">
        Finish Your Homework</p>
      <p
        class="flex w-full px-5 py-3 border-(--light) border text-sm rounded-md hover:bg-black transition duration-75 cursor-pointer">
        Finish Your Homework</p>
      <p
        class="flex w-full px-5 py-3 border-(--light) border text-sm rounded-md hover:bg-black transition duration-75 cursor-pointer">
        Finish Your Homework</p>
      <p
        class="flex w-full px-5 py-3 border-(--light) border text-sm rounded-md hover:bg-black transition duration-75 cursor-pointer">
        Finish Your Homework</p>
      <p
        class="flex w-full px-5 py-3 border-(--light) border text-sm rounded-md hover:bg-black transition duration-75 cursor-pointer">
        Finish Your Homework</p>
      <p
        class="flex w-full px-5 py-3 border-(--light) border text-sm rounded-md hover:bg-black transition duration-75 cursor-pointer">
        Finish Your Homework</p>
      <p
        class="flex w-full px-5 py-3 border-(--light) border text-sm rounded-md hover:bg-black transition duration-75 cursor-pointer">
        Finish Your Homework</p>
      <p
        class="flex w-full px-5 py-3 border-(--light) border text-sm rounded-md hover:bg-black transition duration-75 cursor-pointer">
        Finish Your Homework</p>
      <p
        class="flex w-full px-5 py-3 border-(--light) border text-sm rounded-md hover:bg-black transition duration-75 cursor-pointer">
        Finish Your Homework</p>
      <p
        class="flex w-full px-5 py-3 border-(--light) border text-sm rounded-md hover:bg-black transition duration-75 cursor-pointer">
        Finish Your Homework</p>
      <p
        class="flex w-full px-5 py-3 border-(--light) border text-sm rounded-md hover:bg-black transition duration-75 cursor-pointer">
        Finish Your Homework</p>
    </div>
  </div>

  <!-- Side buttons -->

  <!-- Left buttons -->
  <button type="button"
    class="bg-black/30 flex w-fit h-fit p-3 rounded-md absolute left-10 bottom-20 cursor-pointer hover:text-(--mid) text-(--light) active:scale-95 transition duration-75"
    title="Minimalistic Mode">
    <i class="fa-solid fa-face-smile"></i>
  </button>
  <button type="button"
    class="bg-black/30 flex w-fit h-fit p-3 rounded-md absolute left-10 bottom-5 cursor-pointer hover:text-(--mid) text-(--light) active:scale-95 transition duration-75"
    title="Qur'an">
    <i class="fa-solid fa-music"></i>
  </button>
  <!-- Right buttons -->
  <button type="button"
    class="bg-black/30 flex w-fit h-fit p-3 rounded-md absolute right-10 bottom-20 cursor-pointer hover:text-(--mid) text-(--light) active:scale-95 transition duration-75"
    title="Press (F) for full screen"><i class="fa-solid fa-expand"></i></button>
  <button type="button"
    class="bg-black/30 flex w-fit h-fit p-3 rounded-md absolute right-10 bottom-5 cursor-pointer hover:text-(--mid) text-(--light) active:scale-95 transition duration-75"
    title="Settings"><i class="fa-solid fa-user-gear"></i></button>


  <script type="module" src="/src/main.js"></script>
</body>

</html>
